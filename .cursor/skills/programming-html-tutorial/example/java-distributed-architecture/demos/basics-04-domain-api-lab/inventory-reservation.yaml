openapi: 3.0.3
info:
  title: ShopFlow Inventory Reservation API
  version: 0.1.0
  description: 限界上下文 Inventory · 预留库存（教学 Demo 片段）
paths:
  /api/v1/reservations:
    post:
      operationId: createReservation
      summary: 预留库存
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: 幂等键，重复请求返回同一预留结果
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: 预留成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '409':
          description: 库存不足或冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    CreateReservationRequest:
      type: object
      required: [orderId, skuId, quantity]
      properties:
        orderId:
          type: string
          example: ord-20260403-001
        skuId:
          type: string
          example: sku-laptop-15
        quantity:
          type: integer
          minimum: 1
          example: 2
    ReservationResponse:
      type: object
      properties:
        reservationId:
          type: string
        orderId:
          type: string
        skuId:
          type: string
        quantity:
          type: integer
        status:
          type: string
          enum: [RESERVED]
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: SF-INV-409
        message:
          type: string
