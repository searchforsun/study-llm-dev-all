# dev Profile：降本路由 qwen-turbo（对照 workbench application-dev.yml）
# 启动：mvn spring-boot:run -Dspring-boot.run.profiles=dev,stub
spring:
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.5
          max-tokens: 2048

logging:
  level:
    com.corpassist: DEBUG
