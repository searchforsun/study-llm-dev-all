# CorpAssist S3 · DashScope 调用 resilience 配置（Demo 样例）
# 对应章节：practice-02-resilience
# 用法：合并到 application.yml 或 spring.config.import

resilience4j:
  circuitbreaker:
    instances:
      dashscopeChat:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 6s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      expenseOaApi:
        slidingWindowSize: 10
        failureRateThreshold: 40
        waitDurationInOpenState: 20s
  timelimiter:
    instances:
      dashscopeChat:
        timeoutDuration: 8s
      expenseOaApi:
        timeoutDuration: 5s
  retry:
    instances:
      dashscopeChat:
        maxAttempts: 2
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException

corpassist:
  s3:
    models:
      primary: qwen-plus
      fallback: qwen-turbo
    cache:
      faq-semantic-ttl: 3600s
      room-availability-ttl: 60s
      bypass-tools:
        - roomBooking
        - submitExpense
