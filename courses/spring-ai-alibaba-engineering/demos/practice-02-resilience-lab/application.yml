# CorpAssist S3 · 容灾配置样例（合并 resilience.yaml 到主配置）
spring:
  application:
    name: corpassist-s3-agent
  config:
    import: optional:classpath:resilience.yaml
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${CORPASSIST_AGENT_MODEL:qwen-plus}

corpassist:
  s3:
    models:
      primary: qwen-plus
      fallback: qwen-turbo
    cache:
      faq-semantic-ttl: 3600s

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers
