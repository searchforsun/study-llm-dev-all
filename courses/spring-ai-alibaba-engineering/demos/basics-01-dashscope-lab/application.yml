# CorpAssist S3 Agent — DashScope 最小配置（Demo 对照）
spring:
  application:
    name: corpassist-s3-agent
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${CORPASSIST_AGENT_MODEL:qwen-plus}
          temperature: 0.3
          max-tokens: 2048
    tool:
      max-steps: 12
