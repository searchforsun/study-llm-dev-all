# CorpAssist S3 办公 Agent — Admin DSL 样例（Demo）
app: corpassist-s3-office
version: draft-1
model:
  primary: qwen-plus
  fallback: qwen-turbo
  maxSteps: 8
nodes:
  - id: intent
    type: llm
    prompt: 识别用户意图（订会议室/报销/制度问答）
  - id: route
    type: conditional
    branches:
      - when: intent == room
        goto: tool_room
      - when: intent == expense
        goto: tool_expense
      - else: rag_policy
  - id: tool_room
    type: tool
    name: roomBooking
    hitl: true
  - id: tool_expense
    type: tool
    name: submitExpense
    hitl: true
  - id: rag_policy
    type: rag
    collection: hr-policy
