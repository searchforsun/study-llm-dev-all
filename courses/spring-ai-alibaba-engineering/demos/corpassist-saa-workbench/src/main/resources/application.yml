spring:
  application:
    name: corpassist-s3-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:stub}
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${CORPASSIST_AGENT_MODEL:qwen-plus}
          temperature: 0.3
          max-tokens: 2048

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when_authorized

corpassist:
  demo:
    mode: ${CORPASSIST_DEMO_MODE:stub}
  s3:
    tenant-header: X-CorpAssist-Tenant
    models:
      primary: qwen-plus
      fallback: qwen-turbo
    cache:
      faq-semantic-ttl: 3600s
      room-availability-ttl: 60s

resilience4j:
  circuitbreaker:
    instances:
      dashscopeChat:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 2
  timelimiter:
    instances:
      dashscopeChat:
        timeoutDuration: 8s

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{tenantId:-}]"
