# CorpAssist S3 · 观测与 Trace 日志样例
spring:
  application:
    name: corpassist-s3-agent

corpassist:
  s3:
    tenant-header: X-CorpAssist-Tenant
  obs:
    trace-header: X-Trace-Id
    prompt-replay-enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{tenantId:-}]"
  level:
    com.corpassist: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
