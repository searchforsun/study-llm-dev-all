# CorpAssist 制度库 · DashScope Embedding + pgvector + Rerank 参数模板
spring:
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
      rerank:
        options:
          model: gte-rerank
          top-n: 5
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true

corpassist:
  rag:
    policy-index:
      vector-top-k: 20
      rerank-top-n: 5
      min-score: 0.35
      metadata-filters:
        - tenant
        - version
        - acl_roles
