# CorpAssist 客服场景 — 32K 上下文窗口预算模板（Lab 起点）
# 单位：token；各层占比可在实验中调整，总计须 ≤ window_limit

window_limit: 32000

layers:
  system:
    description: 角色身份、合规约束、回复格式
    budget: 4800
    ratio: 0.15
  retrieval:
    description: 企业知识库 Top-K chunk（默认 Top-5）
    budget: 12800
    ratio: 0.40
  history:
    description: 最近多轮对话（按轮次裁剪）
    budget: 6400
    ratio: 0.20
  tool:
    description: CRM 订单 / 工单等工具回传
    budget: 4800
    ratio: 0.15
  reserve:
    description: 模型输出与突发膨胀缓冲
    budget: 3200
    ratio: 0.10

degrade:
  retrieval_overflow: "Top-8 → 先降 history 轮次，再截断 retrieval chunk"
