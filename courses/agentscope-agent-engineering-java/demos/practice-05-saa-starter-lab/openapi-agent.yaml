openapi: 3.0.3
info:
  title: CorpAssist AgentScope Agent API
  version: 1.0.0
paths:
  /api/agent/run:
    post:
      summary: 同步执行 AgentScope ReActAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, message]
              properties:
                sessionId:
                  type: string
                message:
                  type: string
                maxIterations:
                  type: integer
                  default: 10
      responses:
        "200":
          description: Agent 执行结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                  steps:
                    type: integer
                  traceId:
                    type: string
