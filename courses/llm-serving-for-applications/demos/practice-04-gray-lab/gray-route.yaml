# CorpAssist S4 · 推理灰度路由示意（网关 / BFF 配置草案）
# 应用侧 model 固定为 model-alias；后端按权重切 v1 / v2

model_alias: corp-coder-7b
default_backend: vllm-v1:8000
canary_backend: vllm-v2:8000
canary_percent: 5

# 可选：按 header 强制走金丝雀（内部评测）
header_canary: X-Infer-Canary
header_force_backend: canary

routing:
  default: vllm-v1:8000
  canary: vllm-v2:8000
  canary_percent: 5

rollback:
  triggers:
    - metric: p95_latency_ms
      threshold: 3000
      window: 5m
    - metric: error_rate
      threshold: 0.02
      window: 5m
  action: set_canary_percent_to_0
