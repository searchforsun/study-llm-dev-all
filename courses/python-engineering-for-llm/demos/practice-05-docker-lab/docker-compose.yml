services:
  corpassist-python:
    build:
      context: ../..
      dockerfile: demos/practice-05-docker-lab/Dockerfile
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
