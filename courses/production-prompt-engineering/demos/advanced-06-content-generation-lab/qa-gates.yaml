gates:
  - id: structure
    check: schema_validator
    threshold: "100% blocks"
  - id: readability
    check: sentence_length
    threshold: "avg < 120"
  - id: brand_voice
    check: banned_phrases
    threshold: "0 hits"
  - id: factuality
    check: cite_coverage
    threshold: "0.7"
  - id: dedup
    check: embedding_sim
    threshold: "max < 0.88"
