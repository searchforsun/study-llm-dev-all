# CorpAssist 分层架构 — 本地对照配置
# 对应章节：practice-01-app-architecture

corpassist:
  layers:
    access:
      bff: corpassist-bff
      gateway: llm-gateway
    orchestration:
      dialog: dialog-orchestrator
      agent: agent-runtime
      rag_api: rag-service
    data:
      vector_index: rag-index
      object_store: minio://corpassist-docs
      audit: usage-audit-db

  rag:
    collections:
      hr-policies:
        alias: corpassist-hr-active
        embedding_model: text-embedding-v3
    ingest:
      mode: async
      queue: corpassist-doc-ingest

  agent:
    max_steps: 8
    tool_allowlist:
      - erp.lookup
      - notify.send
      - calendar.read
