# CorpAssist LLM 网关 — 出网与分级路由（示例）
# 对应章节：practice-03-data-privacy

default:
  require_headers:
    - X-Request-Id
    - X-Data-Class   # L1 | L2 | L3 | L4
    - X-Scene        # faq | knowledge | agent | code

routes:
  - match:
      dataClass: [L4]
    action: deny
    http_status: 403
    message: "L4 机密数据不得进入通用 LLM"

  - match:
      dataClass: [L3]
      scene: [knowledge, code]
    provider: qwen-private-vllm
    base_url: https://llm-internal.corpassist.local/v1
    egress: forbidden_public_internet
    log_policy: metadata_only

  - match:
      dataClass: [L1, L2]
      scene: faq
    provider: dashscope
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    egress: logical_egress_domestic_region
    require_contract:
      - no_training_on_customer_data
      - data_residency_cn
    log_policy: metadata_only

  - match:
      dataClass: [L2]
      scene: knowledge
    provider: dashscope-dedicated
  # 专属实例：采购检查表须含审计接口与补丁 SLA

sanitization:
  before_route: true
  rules_ref: pii-rules-v1.yaml

audit:
  fields: [requestId, dataClass, scene, provider, promptFingerprint, tokenUsage]
  forbidden_fields: [promptPlain, completionPlain, apiKey]
