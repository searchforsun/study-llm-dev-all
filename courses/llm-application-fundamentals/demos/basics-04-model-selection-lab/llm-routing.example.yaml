# CorpAssist LLM 网关路由（示例，OpenAI 兼容）
routes:
  - scene: knowledge-qa
    data-class: internal
    provider: qwen-private
    model: qwen2.5-72b-instruct
    base-url: https://llm-internal.corp.example/v1
  - scene: customer-chat
    data-class: internal
    provider: dashscope
    model: qwen-plus
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  - scene: code-assist
    provider: deepseek
    model: deepseek-coder
    base-url: https://api.deepseek.com/v1
fallback:
  on-rate-limit: retry-after-backoff
  on-timeout: switch-to-backup-model
