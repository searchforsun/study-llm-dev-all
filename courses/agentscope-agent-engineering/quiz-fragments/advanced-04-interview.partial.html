<section id="quiz-advanced-04-interview-quiz" class="quiz-section" data-quiz="advanced-04-interview-quiz" data-chapter="advanced-04-interview">
  <h3>章节测验</h3>
  <p class="quiz-panel-lead">学完「面试：AgentScope 生产排障」后作答。<span class="quiz-level-hint">热身+理解+场景</span></p>
  <article class="quiz-item" data-qid="q0" data-answer="B">
    <p class="stem"><strong>0.</strong> （单选）AgentScope 排障第一优先看什么？</p>
    <ul class="options">
      <li><label><input type="radio" name="ase-a04-q0" value="A"> A) 直接猜模型版本</label></li>
      <li><label><input type="radio" name="ase-a04-q0" value="B"> B) AgentScope Trace / Event 日志</label></li>
      <li><label><input type="radio" name="ase-a04-q0" value="C"> C) JVM 堆 dump</label></li>
    </ul>
    <div class="quiz-actions"><button type="button" class="btn-check">检查</button><button type="button" class="btn-hint">提示</button><button type="button" class="btn-answer">答案</button></div>
    <p class="answer hidden"><strong>答案：</strong>B</p>
  </article>
  <article class="quiz-item" data-qid="q1" data-answer="A,C">
    <p class="stem"><strong>1.</strong> （多选）工具假执行的典型征象？</p>
    <ul class="options">
      <li><label><input type="checkbox" name="ase-a04-q1" value="A"> A) 回复称已预订但 Trace 无 tool_call</label></li>
      <li><label><input type="checkbox" name="ase-a04-q1" value="B"> B) tool_call 次数等于 max_iters</label></li>
      <li><label><input type="checkbox" name="ase-a04-q1" value="C"> C) Toolkit 函数体仅 return 硬编码</label></li>
    </ul>
    <div class="quiz-actions"><button type="button" class="btn-check">检查</button><button type="button" class="btn-hint">提示</button><button type="button" class="btn-answer">答案</button></div>
    <p class="answer hidden"><strong>答案：</strong>A、C</p>
  </article>
  <article class="quiz-item" data-qid="q2" data-answer="A">
    <p class="stem"><strong>2.</strong> （单选）max_iters 触发率从 5% 升到 40%，正确做法？</p>
    <ul class="options">
      <li><label><input type="radio" name="ase-a04-q2" value="A"> A) 查 Trace 找死循环根因</label></li>
      <li><label><input type="radio" name="ase-a04-q2" value="B"> B) 仅把 max_iters 调到 20</label></li>
    </ul>
    <div class="quiz-actions"><button type="button" class="btn-check">检查</button><button type="button" class="btn-hint">提示</button><button type="button" class="btn-answer">答案</button></div>
    <p class="answer hidden"><strong>答案：</strong>A</p>
  </article>
  <article class="quiz-item" data-qid="q3" data-answer="buffering">
    <p class="stem"><strong>3.</strong> （填空）Nginx 代理 SSE 时必须关闭 proxy________。</p>

  </article>
